<!DOCTYPE html>
<html>
<head>
  <title>HTML Assignment 3</title>

  <style>
    table {
      border: 1px solid black;
      border-spacing: 1px;
      width: 100%;
    }

    td {
      border: 1px solid black;
      padding: 1px;
    }

    .middle {
      margin: auto;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
    }

    .green {
      background-color: green;
      height: 25px;
    }

    .blue {
      background-color: blue;
      height: 25px;
    }
  </style>
</head>

<body>

  <!-- Page Heading -->
  <h2 class="center">HTML Assignment #3</h2>

  <!-- ================= TABLE 1 ================= -->
  <table id="table-1" class="middle">
    <tr>
      <td id="t11">left</td>
      <td id="t12" class="center">center</td>
      <td id="t13" class="right">right</td>
    </tr>
    <tr>
      <td>left</td>
      <td class="center">center</td>
      <td class="right">right</td>
    </tr>
    <tr>
      <td>left</td>
      <td class="center">center</td>
      <td class="right">right</td>
    </tr>
  </table>

  <br><br>

  <!-- ================= TABLE 2 ================= -->
  <table id="table-2" class="middle">
    <tr>
      <td id="t21" colspan="6">&nbsp;</td>
    </tr>
    <tr>
      <td rowspan="4">&nbsp;</td>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
      <td rowspan="4">&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td colspan="3" rowspan="2">&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
      <td>&nbsp;</td>
    </tr>
    <tr>
      <td colspan="6">&nbsp;</td>
    </tr>
  </table>

  <br><br>

  <!-- ================= TABLE 3 ================= -->
  <table id="table-3" class="middle">
    <tr class="green">
      <td colspan="3"></td>
    </tr>
    <tr>
      <td></td>
      <td id="t-image" class="center">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Michael_Jordan_dunk.jpg"
          width="300"
        >
      </td>
      <td></td>
    </tr>
    <tr class="blue">
      <td colspan="3"></td>
    </tr>
  </table>

</body>
</html>
